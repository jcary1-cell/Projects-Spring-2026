<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niner Voice | Student Presentation Dashboard</title>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Prop-Types is mandatory for Recharts UMD builds -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .uncc-green { color: #005035; }
        .uncc-bg-green { background-color: #005035; }
        .uncc-gold { color: #A49665; }
        .uncc-bg-gold { background-color: #A49665; }
        .chart-container { min-height: 250px; position: relative; }
        
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }

        /* Custom scrollbar for archive */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const App = () => {
            const RechartsObj = window.Recharts || {};
            const { 
                LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, 
                ResponsiveContainer, Radar, RadarChart, 
                PolarGrid, PolarAngleAxis 
            } = RechartsObj;

            const [sessions, setSessions] = useState([
                { id: 1, date: '05/01', topic: 'Initial Intro Practice', narrative: 4, engagement: 3, clarity: 5, presence: 4, fillers: 12 },
                { id: 2, date: '05/05', topic: 'Mid-Draft Rehearsal', narrative: 6, engagement: 5, clarity: 7, presence: 6, fillers: 8 },
            ]);

            const [selectedSessionId, setSelectedSessionId] = useState(null);
            const [showToast, setShowToast] = useState(false);

            const [newSession, setNewSession] = useState({
                topic: '',
                narrative: 5,
                engagement: 5,
                clarity: 5,
                presence: 5,
                fillers: 0
            });

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [sessions, showToast, selectedSessionId]);

            const handleInputChange = (field, value) => {
                setNewSession(prev => ({
                    ...prev,
                    [field]: field === 'topic' ? value : value === '' ? 0 : Number(value)
                }));
            };

            const addSession = useCallback(() => {
                if (!newSession.topic || newSession.topic.trim() === '') return;
                
                const now = new Date();
                const displayDate = `${now.getMonth() + 1}/${now.getDate()}`;

                const sessionToAdd = {
                    ...newSession,
                    id: Date.now(),
                    date: displayDate,
                    topic: newSession.topic.trim(),
                    narrative: Number(newSession.narrative) || 0,
                    engagement: Number(newSession.engagement) || 0,
                    clarity: Number(newSession.clarity) || 0,
                    presence: Number(newSession.presence) || 0,
                    fillers: Number(newSession.fillers) || 0
                };
                
                setSessions(prev => [...prev, sessionToAdd]);
                setSelectedSessionId(null); // Reset view to latest
                setNewSession({ topic: '', narrative: 5, engagement: 5, clarity: 5, presence: 5, fillers: 0 });
                
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3000);
            }, [newSession]);

            const deleteSession = (e, id) => {
                e.stopPropagation(); // Don't trigger "select" when deleting
                setSessions(prev => prev.filter(s => s.id !== id));
                if (selectedSessionId === id) setSelectedSessionId(null);
            };

            // Logic to determine which session to show in the detailed radar chart
            const activeSession = useMemo(() => {
                if (selectedSessionId) {
                    return sessions.find(s => s.id === selectedSessionId) || sessions[sessions.length - 1];
                }
                return sessions[sessions.length - 1];
            }, [sessions, selectedSessionId]);

            const radarData = useMemo(() => {
                if (!activeSession) return [];
                return [
                    { subject: 'Narrative', A: activeSession.narrative },
                    { subject: 'Engagement', A: activeSession.engagement },
                    { subject: 'Clarity', A: activeSession.clarity },
                    { subject: 'Presence', A: activeSession.presence },
                ];
            }, [activeSession]);

            const calculateAvg = () => {
                if (sessions.length === 0) return "0.0";
                const sum = sessions.reduce((acc, s) => acc + (s.narrative + s.engagement + s.clarity + s.presence) / 4, 0);
                return (sum / sessions.length).toFixed(1);
            };

            const isFormValid = newSession.topic && newSession.topic.trim().length > 0;

            if (!LineChart) return <div className="p-20 text-center">Loading assets...</div>;

            return (
                <div className="min-h-screen p-4 md:p-8 relative">
                    {showToast && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 uncc-bg-green text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 animate-slide-in">
                            <i data-lucide="check-circle" style={{width: 18, height: 18}}></i>
                            <span className="text-sm font-bold">Dashboard Synced!</span>
                        </div>
                    )}

                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <div className="uncc-bg-green p-3 rounded-lg text-white shadow-lg shadow-green-900/20">
                                <i data-lucide="mic-2" style={{width: 32, height: 32}}></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold text-slate-900 uppercase tracking-tight italic leading-none">Niner Voice</h1>
                                <p className="text-slate-500 text-[10px] flex items-center gap-1 font-bold uppercase mt-1">
                                    <i data-lucide="map-pin" style={{width: 10, height: 10}}></i> Presentation Coach
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="bg-white px-6 py-3 rounded-xl shadow-sm border border-slate-200 text-center min-w-[120px]">
                                <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Total Sessions</p>
                                <p className="text-2xl font-black uncc-green">{sessions.length}</p>
                            </div>
                            <div className="bg-white px-6 py-3 rounded-xl shadow-sm border border-slate-200 text-center min-w-[120px]">
                                <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Global Avg</p>
                                <p className="text-2xl font-black uncc-gold">{calculateAvg()}</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Input Form Column */}
                        <section className="lg:col-span-1 space-y-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <i data-lucide="plus-square" className="uncc-green" style={{width: 20, height: 20}}></i> Record Session
                                </h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-[10px] font-bold uppercase mb-1 ${!isFormValid ? 'text-red-500' : 'text-slate-500'}`}>
                                            Presentation Name {!isFormValid && '* Required'}
                                        </label>
                                        <input 
                                            type="text" 
                                            className={`w-full p-3 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-[#005035] outline-none text-sm transition-all ${!isFormValid ? 'border-red-100' : 'border-slate-200'}`}
                                            placeholder="Final Senior Project..."
                                            value={newSession.topic}
                                            onChange={e => handleInputChange('topic', e.target.value)}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        {['narrative', 'engagement', 'clarity', 'presence'].map(skill => (
                                            <div key={skill}>
                                                <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 capitalize">{skill}</label>
                                                <input 
                                                    type="number" min="0" max="10" 
                                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                                                    value={newSession[skill]}
                                                    onChange={e => handleInputChange(skill, e.target.value)}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Filler Word Count</label>
                                        <input 
                                            type="number" 
                                            className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                                            value={newSession.fillers}
                                            onChange={e => handleInputChange('fillers', e.target.value)}
                                        />
                                    </div>
                                    <button 
                                        onClick={addSession}
                                        disabled={!isFormValid}
                                        className={`w-full font-bold py-4 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2 ${
                                            !isFormValid ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'uncc-bg-green hover:bg-[#003d29] text-white cursor-pointer'
                                        }`}
                                    >
                                        <i data-lucide="zap" style={{width: 18, height: 18}}></i>
                                        Sync Results
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-900 text-white p-6 rounded-2xl shadow-xl">
                                <h3 className="font-bold flex items-center gap-2 mb-2 italic text-uncc-gold">
                                    <i data-lucide="info" style={{width: 20, height: 20}}></i> Dashboard Help
                                </h3>
                                <p className="text-[11px] opacity-80 leading-relaxed uppercase font-bold tracking-wider">
                                    Click any session in the archive to visualize its specific skill breakdown in the radar chart.
                                </p>
                            </div>
                        </section>

                        {/* Visualizations Column */}
                        <section className="lg:col-span-2 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* radar focused on selected session */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 chart-container">
                                    <div className="flex justify-between items-start mb-6">
                                        <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic underline decoration-uncc-gold decoration-2 underline-offset-4">
                                            {selectedSessionId ? 'Selected Session Balance' : 'Latest Session Balance'}
                                        </h3>
                                        {selectedSessionId && (
                                            <button 
                                                onClick={() => setSelectedSessionId(null)}
                                                className="text-[9px] font-black uppercase text-uncc-green bg-green-50 px-2 py-1 rounded hover:bg-green-100 transition-colors"
                                            >
                                                Back to Latest
                                            </button>
                                        )}
                                    </div>
                                    <div className="h-[180px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RadarChart cx="50%" cy="50%" outerRadius="75%" data={radarData} key={`radar-${activeSession?.id}`}>
                                                <PolarGrid stroke="#e2e8f0" />
                                                <PolarAngleAxis dataKey="subject" tick={{fontSize: 10, fill: '#64748b', fontWeight: 'bold'}} />
                                                <Radar
                                                    name="Current"
                                                    dataKey="A"
                                                    stroke="#005035"
                                                    fill="#005035"
                                                    fillOpacity={0.6}
                                                    isAnimationActive={true}
                                                />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    {activeSession && (
                                        <p className="text-center mt-2 text-[11px] font-bold text-slate-800 italic">
                                            "{activeSession.topic}"
                                        </p>
                                    )}
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 chart-container">
                                    <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6 text-center italic underline decoration-red-400 decoration-2 underline-offset-4">Filler Word Reduction</h3>
                                    <div className="h-[200px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={sessions} key={`filler-${sessions.length}`}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="date" tick={{fontSize: 9}} />
                                                <YAxis tick={{fontSize: 9}} />
                                                <Tooltip />
                                                <Line type="monotone" dataKey="fillers" stroke="#ef4444" strokeWidth={4} dot={{fill: '#ef4444', r: 5, strokeWidth: 2, stroke: '#fff'}} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>

                            {/* Full Timeline */}
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 chart-container">
                                <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8">Skill Evolution Timeline</h3>
                                <div className="h-[240px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={sessions} key={`evolution-${sessions.length}`}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="date" tick={{fontSize: 10, fontWeight: 'bold', fill: '#94a3b8'}} />
                                            <YAxis domain={[0, 10]} tick={{fontSize: 10}} />
                                            <Tooltip />
                                            <Line name="Narrative" type="monotone" dataKey="narrative" stroke="#005035" strokeWidth={4} dot={{r: 4, stroke: '#fff', strokeWidth: 2}} />
                                            <Line name="Engagement" type="monotone" dataKey="engagement" stroke="#A49665" strokeWidth={4} dot={{r: 4, stroke: '#fff', strokeWidth: 2}} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            {/* Clickable Archive */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest italic">Session Archive</h3>
                                    <span className="text-[9px] font-bold text-slate-400 uppercase">Click to view breakdown</span>
                                </div>
                                <div className="max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <table className="w-full text-left">
                                        <tbody className="divide-y divide-slate-100">
                                            {[...sessions].reverse().map(session => (
                                                <tr 
                                                    key={session.id} 
                                                    onClick={() => setSelectedSessionId(session.id)}
                                                    className={`cursor-pointer transition-all group ${
                                                        selectedSessionId === session.id 
                                                        ? 'bg-green-50 ring-1 ring-inset ring-green-200' 
                                                        : 'hover:bg-slate-50'
                                                    }`}
                                                >
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-3">
                                                            {selectedSessionId === session.id && (
                                                                <div className="w-1.5 h-1.5 rounded-full uncc-bg-green animate-pulse"></div>
                                                            )}
                                                            <div>
                                                                <p className={`font-bold text-sm ${selectedSessionId === session.id ? 'uncc-green' : 'text-slate-800'}`}>
                                                                    {session.topic}
                                                                </p>
                                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{session.date}</p>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center">
                                                        <div className={`inline-flex items-center justify-center w-9 h-9 rounded-full border text-[11px] font-black transition-transform group-hover:scale-110 ${
                                                            selectedSessionId === session.id 
                                                            ? 'uncc-bg-green text-white border-transparent' 
                                                            : 'bg-white text-slate-600 border-slate-100'
                                                        }`}>
                                                            {((session.narrative + session.engagement + session.clarity + session.presence)/4).toFixed(1)}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        <button 
                                                            onClick={(e) => deleteSession(e, session.id)} 
                                                            className="text-slate-300 hover:text-red-500 p-2 transition-colors"
                                                        >
                                                            <i data-lucide="trash-2" style={{width: 16, height: 16}}></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                {sessions.length === 0 && (
                                    <div className="p-12 text-center text-slate-400 italic text-sm">Empty archive.</div>
                                )}
                            </div>
                        </section>
                    </main>

                    <footer className="max-w-6xl mx-auto mt-12 py-12 border-t border-slate-200 text-center">
                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
                            Niner Voice • Presentation Intelligence
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
