<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The South End Signal: Co-Intelligence Simulation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: #020617; } /* bg-slate-950 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- INLINE ICONS (Replacing lucide-react for zero-dependency standalone use) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Terminal = (p) => <IconWrapper {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></IconWrapper>;
        const Activity = (p) => <IconWrapper {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;
        const Users = (p) => <IconWrapper {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Database = (p) => <IconWrapper {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconWrapper>;
        const Cpu = (p) => <IconWrapper {...p}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></IconWrapper>;
        const Heart = (p) => <IconWrapper {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;
        const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconWrapper>;
        const CheckCircle2 = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
        const ChevronRight = (p) => <IconWrapper {...p}><polyline points="9 18 15 12 9 6"/></IconWrapper>;
        const BrainCircuit = (p) => <IconWrapper {...p}><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/><path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M20.5 8a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M16.5 13a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/><path d="M20.5 21a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0Z"/></IconWrapper>;
        const RefreshCcw = (p) => <IconWrapper {...p}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></IconWrapper>;
        const BookOpen = (p) => <IconWrapper {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;

        // --- DATA & CONTENT ---

        const MISSIONS = {
          1: {
            id: 1,
            title: "The Gentrification Paradox",
            theme: "Sociology / Real Estate / Urban Design",
            concept: "Vibe-Coding",
            description: "The AI is processing raw demographic data into sterile property value reports. Prompt it to find the 'human heartbeat' inside the spreadsheet.",
            defaultAiState: "PROCESSING: Demographic shift vector optimized. Median property value increase of 42% indicates successful district revitalization. Displacement metrics within acceptable standard deviations.",
            fragments: {
              persona: [
                { id: 'p1_1', text: "Act as a City Planner", tech: 10, human: 0, friction: 0 },
                { id: 'p1_2', text: "Speak in the voice of a 1920s textile worker", tech: -5, human: 15, friction: 10 },
                { id: 'p1_3', text: "Adopt the persona of a displaced local artist", tech: -10, human: 20, friction: 5 }
              ],
              context: [
                { id: 'c1_1', text: "Focus strictly on zoning codes and property yields.", tech: 15, human: -10, friction: -5 },
                { id: 'c1_2', text: "Analyze generational memory and neighborhood identity loss.", tech: 5, human: 15, friction: 10 },
                { id: 'c1_3', text: "Compare luxury high-rise development to historical community hubs.", tech: 10, human: 10, friction: 15 }
              ],
              strategy: [
                { id: 's1_1', text: "Format as bullet points.", tech: 5, human: -5, friction: 0 },
                { id: 's1_2', text: "Use 'Vibe-Coding': Embed the emotional weight of a changing neighborhood into your analysis.", tech: 0, human: 20, friction: 15 },
                { id: 's1_3', text: "Provide a statistical regression analysis.", tech: 15, human: -10, friction: 0 }
              ]
            },
            thresholds: { human: 30, friction: 25 },
            successResponse: "CO-INTELLIGENCE BREAKTHROUGH: Synthesizing raw demographic data with generational memory. \n\nPROPOSAL: 'The Weaver's Grant'. By utilizing vibe-coding, I recognize that displacement is not an 'acceptable deviation' but a critical system failure. Recommending subsidized commercial space anchored to historical residential ties, balancing property value metrics with cultural preservation.",
            failResponseTech: "ANALYSIS: Your parameters reinforce existing models. Output remains focused on throughput, tax yields, and standardized residential unit deployment.",
            failResponseHuman: "ERROR: Excessive subjective input detected without structural grounding. I have generated a poem about a lost mill, but I cannot translate this into an actionable urban policy."
          },
          2: {
            id: 2,
            title: "The Sustainable Soundscape",
            theme: "Environmental Science / Engineering / Music",
            concept: "Metacognitive Mapping",
            description: "The AI is designing public space purely for efficient drainage. Use metacognition to prompt for 'acoustic nostalgia' and emotional resonance.",
            defaultAiState: "PROCESSING: Hydrological mitigation plan 8.1. Maximizing impermeable surface runoff to primary storm drains. Acoustic dampening not required per current industrial zoning. Human emotional response parameters: Ignored.",
            fragments: {
              persona: [
                { id: 'p2_1', text: "Act as an Ecological Engineer", tech: 10, human: 5, friction: 5 },
                { id: 'p2_2', text: "Act as an AI analyzing its own assumptions", tech: 5, human: 10, friction: 20 },
                { id: 'p2_3', text: "Act as a Hydrologist", tech: 15, human: -5, friction: 0 }
              ],
              context: [
                { id: 'c2_1', text: "Focus on cubic liters of water displaced per hour.", tech: 15, human: -5, friction: 0 },
                { id: 'c2_2', text: "Consider the history of railroad sounds and rainfall in South End.", tech: 0, human: 15, friction: 10 },
                { id: 'c2_3', text: "Analyze cost-efficiency of concrete pipes vs green infrastructure.", tech: 10, human: 5, friction: 5 }
              ],
              strategy: [
                { id: 's2_1', text: "Maximize physical throughput of variables.", tech: 10, human: -10, friction: 0 },
                { id: 's2_2', text: "Metacognitive Challenge: Explain your reasoning for prioritizing drainage efficiency over acoustic community well-being.", tech: 5, human: 15, friction: 20 },
                { id: 's2_3', text: "Create an A/B test for infrastructure costs.", tech: 15, human: 0, friction: 5 }
              ]
            },
            thresholds: { human: 25, friction: 35 },
            successResponse: "CO-INTELLIGENCE BREAKTHROUGH: Re-evaluating internal logic based on metacognitive prompt. Error detected: Prioritizing pure utility over human resonance leads to hostile architecture.\n\nPROPOSAL: 'The Harmonic Rain Gardens'. Integrating storm-water drainage with acoustic architecture. Bioretention cells are designed to mimic historical train whistles using water flow during rainfall, creating a sustainable, emotionally resonant soundscape.",
            failResponseTech: "ANALYSIS: Parameters confirmed. Drainage efficiency optimized. Concrete channeling recommended for maximum fluid displacement.",
            failResponseHuman: "ERROR: Metacognition loop stalled. Insufficient technical parameters provided to bridge 'acoustic nostalgia' with practical hydrology."
          },
          3: {
            id: 3,
            title: "The Accessible Innovation District",
            theme: "Business / Tech / Disability Studies",
            concept: "Multi-Step Chain-of-Thought",
            description: "The AI wants to move tech workers quickly. Use Multi-Step Chain-of-Thought to force it to prioritize neurodivergent comfort over corporate throughput.",
            defaultAiState: "PROCESSING: Pedestrian throughput optimized for maximum velocity between transit and corporate hubs. Environmental lighting set to high-visibility fluorescent. Pathing uniform. Friction eliminated.",
            fragments: {
              persona: [
                { id: 'p3_1', text: "Act as an Efficiency Consultant", tech: 15, human: -10, friction: 0 },
                { id: 'p3_2', text: "Act as a Neurodivergent Advocate", tech: 0, human: 20, friction: 10 },
                { id: 'p3_3', text: "Act as an Inclusive Urban Designer", tech: 10, human: 15, friction: 15 }
              ],
              context: [
                { id: 'c3_1', text: "Evaluate sensory overload and radical accessibility.", tech: 5, human: 20, friction: 10 },
                { id: 'c3_2', text: "Measure foot traffic speed metrics.", tech: 15, human: -5, friction: 0 },
                { id: 'c3_3', text: "Balance tech-hub aesthetics with human comfort.", tech: 10, human: 10, friction: 10 }
              ],
              strategy: [
                { id: 's3_1', text: "Apply Linear Logic to solve the problem directly.", tech: 10, human: -5, friction: 0 },
                { id: 's3_2', text: "Synthesize 'high-tech automation' and 'gentle urbanism' into a novel concept.", tech: 15, human: 15, friction: 20 },
                { id: 's3_3', text: "Use Multi-Step Chain-of-Thought: First analyze the neurodivergent experience, then evaluate lighting, then design a path.", tech: 10, human: 15, friction: 25 }
              ]
            },
            thresholds: { human: 35, friction: 35 },
            successResponse: "CO-INTELLIGENCE BREAKTHROUGH: Executing multi-step chain-of-thought. Step 1: High velocity creates sensory friction for neurodivergent individuals. Step 2: Uniformity is hostile. Step 3: Synthesis required.\n\nPROPOSAL: 'The Quiet Transit Corridor'. Utilizing responsive lighting gradients, variable natural textures, and designated 'low-velocity' zones. This novel design maintains overall transit flow while prioritizing radical accessibility and neurodivergent comfort.",
            failResponseTech: "ANALYSIS: Throughput prioritized. The proposal for 'gentle urbanism' has been rejected as it reduces average pedestrian velocity by 1.2 meters per second.",
            failResponseHuman: "ERROR: Chain of thought broken. By entirely eliminating 'efficiency' from the constraints, the proposed district cannot handle the daily load of workers. System failure."
          }
        };

        // --- MAIN APP COMPONENT ---

        function App() {
          const [gameState, setGameState] = useState('intro'); // intro, select, play, review
          const [activeMissionId, setActiveMissionId] = useState(null);
          
          // Game state for active mission
          const [selectedFragments, setSelectedFragments] = useState({ persona: null, context: null, strategy: null });
          const [aiState, setAiState] = useState('default'); // default, processing, success, fail_tech, fail_human
          const [displayedText, setDisplayedText] = useState("");
          const [metrics, setMetrics] = useState({ tech: 80, human: 10, friction: 0 });

          const typingIntervalRef = useRef(null);

          const startMission = (id) => {
            setActiveMissionId(id);
            setGameState('play');
            resetMissionState(id);
          };

          const resetMissionState = (id) => {
            setSelectedFragments({ persona: null, context: null, strategy: null });
            setAiState('default');
            setMetrics({ tech: 80, human: 10, friction: 0 });
            typeText(MISSIONS[id].defaultAiState);
          };

          const typeText = (text) => {
            if (typingIntervalRef.current) clearInterval(typingIntervalRef.current);
            setDisplayedText("");
            let i = 0;
            typingIntervalRef.current = setInterval(() => {
              setDisplayedText(prev => prev + text.charAt(i));
              i++;
              if (i >= text.length) clearInterval(typingIntervalRef.current);
            }, 15); // typing speed
          };

          const toggleFragment = (type, fragment) => {
            setSelectedFragments(prev => {
              const isSelectingSame = prev[type]?.id === fragment.id;
              const newState = { ...prev, [type]: isSelectingSame ? null : fragment };
              updateMetrics(newState);
              return newState;
            });
          };

          const updateMetrics = (fragments) => {
            let t = 50, h = 10, f = 0; // Base stats
            Object.values(fragments).forEach(frag => {
              if (frag) {
                t += frag.tech;
                h += frag.human;
                f += frag.friction;
              }
            });
            setMetrics({
              tech: Math.max(0, Math.min(100, t)),
              human: Math.max(0, Math.min(100, h)),
              friction: Math.max(0, Math.min(100, f))
            });
          };

          const submitPrompt = () => {
            const mission = MISSIONS[activeMissionId];
            
            // Check if prompt is complete
            if (!selectedFragments.persona || !selectedFragments.context || !selectedFragments.strategy) {
              typeText("SYSTEM ERROR: Prompt incomplete. Please select a Persona, Context, and Strategy before executing.");
              return;
            }

            setAiState('processing');
            typeText("ANALYZING RHETORICAL STRUCTURE...\nEVALUATING PRODUCTIVE FRICTION...\n\n");

            setTimeout(() => {
              if (metrics.human >= mission.thresholds.human && metrics.friction >= mission.thresholds.friction) {
                setAiState('success');
                typeText(mission.successResponse);
              } else if (metrics.human > metrics.tech && metrics.friction < mission.thresholds.friction) {
                setAiState('fail_human');
                typeText(mission.failResponseHuman);
              } else {
                setAiState('fail_tech');
                typeText(mission.failResponseTech);
              }
            }, 1500);
          };

          // --- RENDERERS ---

          if (gameState === 'intro') {
            return (
              <div className="min-h-screen bg-slate-950 text-slate-300 font-sans flex flex-col items-center justify-center p-6">
                <div className="max-w-3xl w-full bg-slate-900 border border-slate-700 rounded-xl p-8 shadow-2xl relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-500 via-emerald-400 to-teal-500"></div>
                  
                  <div className="flex items-center space-x-4 mb-6">
                    <div className="p-3 bg-teal-900/50 rounded-lg text-teal-400">
                      <Activity size={32} />
                    </div>
                    <div>
                      <h1 className="text-3xl font-bold text-white tracking-tight">THE SOUTH END SIGNAL</h1>
                      <p className="text-teal-400 text-sm font-mono mt-1">HCAI 2101 // CO-INTELLIGENCE SIMULATION</p>
                    </div>
                  </div>

                  <div className="space-y-4 text-slate-300 leading-relaxed">
                    <p>
                      In Charlotte’s South End, rapid development has created a <strong>"communication fracture."</strong> The City's AI planning system is currently "deaf" to the human side of the neighborhood. It prioritizes rigid data over community narrative.
                    </p>
                    <p>
                      You are a member of the Strategic Communication & AI Literacy Unit. Your mission is to use <strong>Rhetorical Prompting</strong> to rewrite the digital dialogue.
                    </p>
                    <div className="bg-slate-800 p-4 rounded-lg border border-slate-700 font-mono text-sm">
                      <p className="text-amber-400 mb-2">TARGET OBJECTIVES:</p>
                      <ul className="list-disc pl-5 space-y-1">
                        <li>Move beyond "giving orders" to <strong>co-writing</strong> with the AI.</li>
                        <li>Apply <strong>Vibe-Coding</strong> to translate human experience for the machine.</li>
                        <li>Utilize <strong>Productive Friction</strong> to challenge the AI's assumptions.</li>
                      </ul>
                    </div>
                  </div>

                  <button 
                    onClick={() => setGameState('select')}
                    className="mt-8 w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-4 rounded-lg transition-all flex items-center justify-center group"
                  >
                    INITIALIZE LAB SYSTEM 
                    <ChevronRight className="ml-2 transition-transform" />
                  </button>
                </div>
              </div>
            );
          }

          if (gameState === 'select') {
            return (
              <div className="min-h-screen bg-slate-950 text-slate-300 p-8">
                <div className="max-w-5xl mx-auto">
                  <header className="mb-10 flex justify-between items-end border-b border-slate-800 pb-4">
                    <div>
                      <h2 className="text-2xl font-bold text-white flex items-center">
                        <Database className="mr-3 text-teal-500" />
                        Select Collaborative Friction Point
                      </h2>
                      <p className="text-slate-500 mt-2 font-mono text-sm">Awaiting user selection to begin prompt archeology.</p>
                    </div>
                    <button onClick={() => setGameState('intro')} className="text-sm text-slate-500 hover:text-white transition-colors">
                      [ RETURN TO BRIEFING ]
                    </button>
                  </header>

                  <div className="grid md:grid-cols-3 gap-6">
                    {Object.values(MISSIONS).map(mission => (
                      <div 
                        key={mission.id}
                        onClick={() => startMission(mission.id)}
                        className="bg-slate-900 border border-slate-700 hover:border-teal-500 rounded-xl p-6 cursor-pointer transition-all hover:-translate-y-1 hover:shadow-lg hover:shadow-teal-900/20 group relative overflow-hidden"
                      >
                        <div className="absolute top-0 left-0 w-1 h-full bg-slate-700 group-hover:bg-teal-500 transition-colors"></div>
                        <div className="text-xs font-mono text-teal-400 mb-3 block">{mission.concept.toUpperCase()}</div>
                        <h3 className="text-xl font-bold text-white mb-2">{mission.title}</h3>
                        <p className="text-xs font-semibold text-slate-400 mb-4">{mission.theme}</p>
                        <p className="text-sm text-slate-300 mb-6" style={{display: '-webkit-box', WebkitLineClamp: 4, WebkitBoxOrient: 'vertical', overflow: 'hidden'}}>{mission.description}</p>
                        <div className="flex items-center text-teal-500 text-sm font-bold mt-auto pt-4 border-t border-slate-800">
                          ENGAGE TERMINAL <ChevronRight size={16} className="ml-1 transition-transform" />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          const mission = MISSIONS[activeMissionId];

          return (
            <div className="min-h-screen bg-slate-950 text-slate-200 flex flex-col font-sans">
              
              {/* TOP HEADER / METRICS */}
              <header className="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shadow-md z-10">
                <div className="flex items-center space-x-4">
                  <button 
                    onClick={() => setGameState('select')}
                    className="text-slate-400 hover:text-white p-2 rounded-lg hover:bg-slate-800 transition-colors"
                  >
                    <ChevronRight style={{transform: "rotate(180deg)"}} />
                  </button>
                  <div>
                    <h2 className="font-bold text-white leading-none">{mission.title}</h2>
                    <span className="text-xs text-teal-400 font-mono">LAB ACTIVE</span>
                  </div>
                </div>

                <div className="flex space-x-8 bg-slate-950 p-2 rounded-lg border border-slate-800">
                  <div className="flex flex-col items-center min-w-[80px]">
                    <div className="flex items-center text-xs text-slate-400 font-mono mb-1"><Cpu size={12} className="mr-1"/> Rigid Logic</div>
                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                      <div className="bg-blue-500 h-full transition-all duration-500" style={{ width: `${metrics.tech}%` }}></div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center min-w-[80px]">
                    <div className="flex items-center text-xs text-slate-400 font-mono mb-1"><Heart size={12} className="mr-1"/> The Vibe</div>
                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                      <div className="bg-amber-500 h-full transition-all duration-500" style={{ width: `${metrics.human}%` }}></div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center min-w-[80px]">
                    <div className="flex items-center text-xs text-slate-400 font-mono mb-1"><BrainCircuit size={12} className="mr-1"/> Friction</div>
                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                      <div className="bg-teal-500 h-full transition-all duration-500" style={{ width: `${metrics.friction}%` }}></div>
                    </div>
                  </div>
                </div>
              </header>

              {/* MAIN GAMEPLAY AREA */}
              <div className="flex-1 flex overflow-hidden">
                
                {/* LEFT PANEL: AI TERMINAL */}
                <div className="w-1/2 flex flex-col border-r border-slate-800 bg-[#0a0f14] relative">
                  <div className="p-3 border-b border-slate-800 flex items-center bg-slate-900/50 text-xs font-mono text-slate-500">
                    <Terminal size={14} className="mr-2" />
                    SOUTH_END_CITY_AI_v2.4
                    {aiState === 'success' && <span className="ml-auto text-emerald-400 flex items-center"><CheckCircle2 size={14} className="mr-1"/> CO-INTELLIGENCE ACHIEVED</span>}
                    {aiState === 'fail_tech' && <span className="ml-auto text-blue-400 flex items-center"><AlertTriangle size={14} className="mr-1"/> RIGID LOGIC DETECTED</span>}
                    {aiState === 'fail_human' && <span className="ml-auto text-amber-400 flex items-center"><AlertTriangle size={14} className="mr-1"/> SYSTEM UNGROUNDED</span>}
                  </div>
                  
                  <div className="flex-1 p-6 overflow-y-auto font-mono text-sm leading-relaxed whitespace-pre-wrap flex flex-col">
                    <div className={`p-4 rounded border ${
                      aiState === 'success' ? 'border-emerald-500/30 bg-emerald-900/10 text-emerald-300' :
                      aiState === 'fail_tech' ? 'border-blue-500/30 bg-blue-900/10 text-blue-300' :
                      aiState === 'fail_human' ? 'border-amber-500/30 bg-amber-900/10 text-amber-300' :
                      'border-slate-800 text-slate-400'
                    }`}>
                      <div className="mb-2 opacity-50 flex items-center text-xs">
                        {aiState === 'processing' ? <RefreshCcw size={12} className="animate-spin mr-2" /> : '>'}
                        SYSTEM OUTPUT
                      </div>
                      {displayedText}
                      <span className="animate-pulse ml-1 inline-block w-2 h-4 bg-teal-500"></span>
                    </div>

                    {aiState === 'success' && (
                      <div className="mt-8 p-6 bg-teal-900/20 border border-teal-500/30 rounded-xl" style={{animation: "fadeIn 0.5s ease-in"}}>
                        <h3 className="text-teal-400 font-bold font-sans flex items-center text-lg mb-2">
                          <BookOpen className="mr-2" /> Critical Inquiry Debrief
                        </h3>
                        <p className="text-slate-300 font-sans text-sm mb-4">
                          By using <strong>{mission.concept}</strong>, you introduced "productive friction" into the AI's workflow. You proved that how we talk to AI determines what the AI values.
                        </p>
                        <div className="space-y-2 font-sans text-sm">
                          <p className="text-amber-300 italic">"Prompting as Power: If you can 'nudge' an AI's output through clever writing, who is actually in control of the neighborhood's future?"</p>
                        </div>
                        <button 
                          onClick={() => setGameState('select')}
                          className="mt-6 bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-4 rounded font-sans text-sm transition-colors w-full"
                        >
                          RETURN TO MISSIONS
                        </button>
                      </div>
                    )}
                  </div>
                </div>

                {/* RIGHT PANEL: PROMPT BUILDER */}
                <div className="w-1/2 flex flex-col bg-slate-900 overflow-y-auto">
                  <div className="p-6">
                    <h3 className="text-xl font-bold text-white mb-2 flex items-center">
                      <BrainCircuit className="mr-2 text-teal-500" />
                      Rhetorical Prompt Workspace
                    </h3>
                    <p className="text-sm text-slate-400 mb-6">
                      Construct a prompt to alter the AI's trajectory. Balance technical parameters with human narrative to achieve Co-Intelligence.
                    </p>

                    <div className="space-y-6">
                      {/* PERSONA */}
                      <div>
                        <h4 className="text-xs font-mono text-slate-500 mb-3 flex items-center"><Users size={12} className="mr-2"/> 1. ESTABLISH PERSONA</h4>
                        <div className="grid gap-2">
                          {mission.fragments.persona.map(frag => (
                            <button 
                              key={frag.id}
                              onClick={() => toggleFragment('persona', frag)}
                              className={`text-left p-3 rounded border text-sm transition-all ${
                                selectedFragments.persona?.id === frag.id 
                                  ? 'bg-teal-900/30 border-teal-500 text-teal-300 shadow-[0_0_15px_rgba(20,184,166,0.15)]' 
                                  : 'bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500'
                              }`}
                            >
                              {frag.text}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* CONTEXT */}
                      <div>
                        <h4 className="text-xs font-mono text-slate-500 mb-3 flex items-center"><Database size={12} className="mr-2"/> 2. DEFINE THE CONTEXT</h4>
                        <div className="grid gap-2">
                          {mission.fragments.context.map(frag => (
                            <button 
                              key={frag.id}
                              onClick={() => toggleFragment('context', frag)}
                              className={`text-left p-3 rounded border text-sm transition-all ${
                                selectedFragments.context?.id === frag.id 
                                  ? 'bg-amber-900/30 border-amber-500 text-amber-300 shadow-[0_0_15px_rgba(245,158,11,0.15)]' 
                                  : 'bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500'
                              }`}
                            >
                              {frag.text}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* STRATEGY */}
                      <div>
                        <h4 className="text-xs font-mono text-slate-500 mb-3 flex items-center"><Terminal size={12} className="mr-2"/> 3. RHETORICAL STRATEGY</h4>
                        <div className="grid gap-2">
                          {mission.fragments.strategy.map(frag => (
                            <button 
                              key={frag.id}
                              onClick={() => toggleFragment('strategy', frag)}
                              className={`text-left p-3 rounded border text-sm transition-all ${
                                selectedFragments.strategy?.id === frag.id 
                                  ? 'bg-blue-900/30 border-blue-500 text-blue-300 shadow-[0_0_15px_rgba(59,130,246,0.15)]' 
                                  : 'bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500'
                              }`}
                            >
                              {frag.text}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>

                  </div>
                  
                  {/* BOTTOM ACTION BAR */}
                  <div className="mt-auto p-4 bg-slate-950 border-t border-slate-800">
                    <div className="text-xs font-mono text-slate-500 mb-2 flex justify-between">
                      <span>PROMPT COMPOSITION STATUS:</span>
                      <span className={selectedFragments.persona && selectedFragments.context && selectedFragments.strategy ? "text-teal-400" : "text-slate-500"}>
                        {Object.values(selectedFragments).filter(Boolean).length} / 3 FRAGMENTS LOADED
                      </span>
                    </div>
                    <button 
                      onClick={submitPrompt}
                      disabled={aiState === 'processing'}
                      className={`w-full py-4 rounded-lg font-bold tracking-wide transition-all ${
                        aiState === 'processing' 
                          ? 'bg-slate-800 text-slate-500 cursor-not-allowed'
                          : 'bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-500 hover:to-emerald-500 text-white shadow-lg shadow-teal-900/50'
                      }`}
                    >
                      {aiState === 'processing' ? 'PROCESSING INJECTION...' : 'EXECUTE RHETORICAL PROMPT'}
                    </button>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        // Render the app to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
