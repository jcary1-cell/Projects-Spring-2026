<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCAI 2101 Scout Portal</title>
    
    <!-- React & Babel for Browser Compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Prevent Lucide from breaking layout before replacement */
        .icon-wrapper { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
        .lucide { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Environment Globals
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hcai-2101-scout-portal';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Make Firebase available to Babel/React
        window.FB = { auth, db, appId, collection, addDoc, onSnapshot, query, doc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Optimized Icon Component to prevent "NotFoundError"
        // This uses a stable wrapper so Lucide's DOM changes don't crash React's removeChild calls
        const Icon = ({ name, size = 24, className = "" }) => {
            const wrapperRef = useRef(null);

            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    window.lucide.createIcons({
                        attrs: {
                            class: className,
                            'stroke-width': 2,
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className]);

            return (
                <span 
                    ref={wrapperRef} 
                    className={`icon-wrapper ${className}`} 
                    style={{ width: size, height: size, minWidth: size, minHeight: size }}
                >
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        // --- Views ---

        const WelcomeView = ({ onStart }) => (
            <div className="flex flex-col items-center justify-center min-h-[500px] text-center p-8 bg-white rounded-3xl shadow-sm border border-slate-200">
                <div className="bg-indigo-600 p-5 rounded-3xl mb-8 shadow-xl rotate-3 flex items-center justify-center">
                    <Icon name="globe" size={48} className="text-white" />
                </div>
                <h1 className="text-5xl font-black text-slate-900 mb-6 tracking-tight">Disciplinary Scout Portal</h1>
                <p className="text-xl text-slate-600 max-w-2xl mb-10 leading-relaxed">
                    Connect to the shared intelligence map. Submit your findings and see what your peers across all disciplines are discovering in real-time.
                </p>
                <button 
                    onClick={onStart}
                    className="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-5 rounded-2xl font-bold text-lg transition-all hover:scale-105 shadow-2xl"
                >
                    Sync Research to Map <Icon name="arrow-right" size={22} className="ml-1" />
                </button>
            </div>
        );

        const InputView = ({ scoutData, onInputChange, onStatusChange, onCancel, onSubmit }) => (
            <div className="max-w-3xl mx-auto p-10 bg-white shadow-2xl rounded-3xl border border-slate-100">
                <div className="flex justify-between items-center mb-8">
                    <h2 className="text-3xl font-bold flex items-center gap-3 text-slate-800">
                        <Icon name="book-open" size={32} className="text-indigo-600" /> Intelligence Upload
                    </h2>
                    <button onClick={onCancel} className="text-slate-400 hover:text-slate-600 font-bold uppercase text-xs tracking-widest">Cancel</button>
                </div>
                
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Your Name</label>
                            <input name="name" value={scoutData.name} onChange={onInputChange} 
                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="e.g., Scout Smith" />
                        </div>
                        <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Academic Major</label>
                            <input name="major" value={scoutData.major} onChange={onInputChange} 
                                className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="e.g., Sociology" />
                        </div>
                    </div>

                    <div className="space-y-2">
                        <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Source Title</label>
                        <input name="articleTitle" value={scoutData.articleTitle} onChange={onInputChange} 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="What is the article/post called?" />
                    </div>

                    <div className="space-y-2">
                        <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Link (URL)</label>
                        <input name="sourceUrl" value={scoutData.sourceUrl} onChange={onInputChange} 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="https://..." />
                    </div>

                    <div className="space-y-2">
                        <label className="text-sm font-bold text-slate-500 uppercase tracking-wider">Key Impact Summary</label>
                        <textarea name="keyImpact" value={scoutData.keyImpact} onChange={onInputChange} rows="4" 
                            className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 focus:bg-white transition-all outline-none resize-none" placeholder="Explain how AI is changing this field in 2-3 sentences."></textarea>
                    </div>

                    <div className="space-y-4 pt-4">
                        <label className="text-sm font-bold text-slate-500 uppercase tracking-wider block">Disciplinary Outlook</label>
                        <div className="flex gap-4">
                            {['augmented', 'threatened', 'transformed'].map((status) => (
                                <button key={status} type="button" onClick={() => onStatusChange(status)}
                                    className={`flex-1 py-4 px-2 rounded-2xl capitalize font-bold border-2 transition-all ${scoutData.futureJobStatus === status ? 'border-indigo-600 bg-indigo-50 text-indigo-700 ring-4 ring-indigo-50' : 'border-slate-100 bg-slate-50 text-slate-400'}`}>
                                    {status}
                                </button>
                            ))}
                        </div>
                    </div>

                    <button onClick={onSubmit} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-600 transition-all shadow-xl mt-6">
                        Publish to Class Map
                    </button>
                </div>
            </div>
        );

        const InterviewView = ({ scoutData, onReset, onViewMap }) => (
            <div className="max-w-4xl mx-auto">
                <div className="bg-emerald-600 text-white p-8 rounded-t-[2.5rem] flex items-center justify-between">
                    <div>
                        <span className="bg-emerald-500 text-[10px] font-black px-3 py-1 rounded-full uppercase mb-2 inline-block">Transmission Active</span>
                        <h2 className="text-3xl font-black italic tracking-tight">SCOUT DEBRIEFING</h2>
                        <p className="opacity-90 font-medium">{scoutData.name} • {scoutData.major}</p>
                    </div>
                    <Icon name="mic" size={32} className="animate-pulse" />
                </div>
                <div className="bg-white p-10 border-x border-b border-slate-200 rounded-b-[2.5rem] shadow-2xl">
                    <div className="mb-10 p-6 bg-indigo-50 rounded-2xl border-l-8 border-indigo-500">
                        <h3 className="font-black text-indigo-800 uppercase text-[10px] tracking-widest mb-2">Findings</h3>
                        <p className="text-2xl font-bold text-slate-900 mb-2">{scoutData.articleTitle}</p>
                        <p className="text-slate-700 text-lg leading-relaxed">{scoutData.keyImpact}</p>
                    </div>
                    <div className="flex items-center gap-3 mb-6 text-emerald-600">
                        <Icon name="message-square" size={24} />
                        <h3 className="text-xl font-black uppercase">Interview Guide</h3>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {[
                            "How does this article change your personal outlook on your major?",
                            "What is the one 'human' skill AI can't replace yet?",
                            "Will your field be unrecognizable by 2030?",
                            "What would you warn current students about today?"
                        ].map((q, i) => (
                            <div key={i} className="p-6 bg-slate-50 border-2 border-slate-100 rounded-2xl">
                                <span className="text-indigo-600 font-black mr-2">Q{i+1}</span>
                                <p className="text-slate-700 font-medium mt-1">{q}</p>
                            </div>
                        ))}
                    </div>
                    <div className="mt-12 pt-8 border-t flex flex-col sm:flex-row justify-between items-center gap-4">
                        <button onClick={onReset} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-bold transition-colors">
                            <Icon name="rotate-ccw" size={18} /> File New Report
                        </button>
                        <button onClick={onViewMap} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">
                            View Intelligence Map
                        </button>
                    </div>
                </div>
            </div>
        );

        const GalleryView = ({ submissions, onAdd, onInterview }) => (
            <div className="max-w-6xl mx-auto px-4">
                <div className="flex justify-between items-center mb-10">
                    <div>
                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">Intelligence Map</h2>
                        <p className="text-slate-500 font-medium">Classroom Repository ({submissions.length} reports)</p>
                    </div>
                    <button onClick={onAdd} className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">
                        <Icon name="plus-circle" size={20} /> Add Research
                    </button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {submissions.length === 0 ? (
                        <div className="col-span-full py-20 text-center text-slate-400 font-bold border-4 border-dashed rounded-3xl">
                            Intelligence Map is currently empty.
                        </div>
                    ) : (
                        submissions.map((s) => (
                            <div key={s.id} className="bg-white p-8 rounded-3xl border border-slate-100 hover:shadow-2xl transition-all cursor-pointer" onClick={() => onInterview(s)}>
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-black text-xl">{(s.name || "S")[0]}</div>
                                    <div>
                                        <p className="text-[10px] text-indigo-500 font-black uppercase tracking-widest">{s.major || "Scout"}</p>
                                        <p className="font-bold text-slate-900">{s.name}</p>
                                    </div>
                                </div>
                                <h4 className="font-black text-slate-800 mb-3 text-lg leading-snug">{s.articleTitle}</h4>
                                <p className="text-slate-600 text-sm line-clamp-3 italic mb-6">{s.keyImpact}</p>
                                <div className="flex justify-between items-center pt-4 border-t">
                                    <span className="text-[10px] px-3 py-1 bg-slate-100 rounded-full font-black uppercase tracking-tighter">{s.futureJobStatus}</span>
                                    <span className="text-indigo-600 font-bold text-xs">Analyze →</span>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            </div>
        );

        // --- Main App ---

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('welcome');
            const [loading, setLoading] = useState(true);
            const [submissions, setSubmissions] = useState([]);
            const [scoutData, setScoutData] = useState({
                name: '', major: '', articleTitle: '', sourceUrl: '', keyImpact: '', futureJobStatus: 'augmented'
            });

            useEffect(() => {
                const init = async () => {
                    const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FB;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth Error", e);
                    }
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setLoading(false);
                    });
                };
                init();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, collection, onSnapshot, appId } = window.FB;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSubmissions(data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, (error) => {
                    console.error("Firestore Error", error);
                });
                return () => unsubscribe();
            }, [user]);

            const handleInputChange = useCallback((e) => {
                const { name, value } = e.target;
                setScoutData(prev => ({ ...prev, [name]: value }));
            }, []);

            const submit = async () => {
                if (!scoutData.name || !scoutData.articleTitle) return;
                const { db, collection, addDoc, appId } = window.FB;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
                        ...scoutData, userId: user.uid, timestamp: Date.now()
                    });
                    setView('interview');
                } catch (e) {
                    console.error("Submit Error", e);
                }
            };

            const reset = () => {
                setScoutData({ name: '', major: '', articleTitle: '', sourceUrl: '', keyImpact: '', futureJobStatus: 'augmented' });
                setView('input');
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center">
                    <Icon name="loader-2" size={48} className="animate-spin text-indigo-600" />
                </div>
            );

            return (
                <div className="pb-20">
                    <header className="max-w-6xl mx-auto p-8 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-900 text-white p-2 rounded-xl shadow-lg flex items-center justify-center">
                                <Icon name="graduation-cap" size={24} />
                            </div>
                            <span className="font-black text-xl tracking-tight uppercase">HCAI 2101</span>
                        </div>
                        <nav className="flex gap-6 text-xs font-black uppercase tracking-widest text-slate-400">
                            <button onClick={() => setView('welcome')} className={view === 'welcome' ? 'text-indigo-600' : ''}>Home</button>
                            <button onClick={() => setView('gallery')} className={view === 'gallery' ? 'text-indigo-600' : ''}>Map</button>
                        </nav>
                    </header>

                    <main className="max-w-6xl mx-auto px-6">
                        {view === 'welcome' && <WelcomeView onStart={() => setView('input')} />}
                        {view === 'input' && <InputView scoutData={scoutData} onInputChange={handleInputChange} onStatusChange={(s) => setScoutData({...scoutData, futureJobStatus: s})} onCancel={() => setView('welcome')} onSubmit={submit} />}
                        {view === 'interview' && <InterviewView scoutData={scoutData} onReset={reset} onViewMap={() => setView('gallery')} />}
                        {view === 'gallery' && <GalleryView submissions={submissions} onAdd={() => setView('input')} onInterview={(s) => { setScoutData(s); setView('interview'); }} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
