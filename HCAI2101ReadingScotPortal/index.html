<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCAI 2101 Scout Portal</title>
    
    <!-- React & Babel for Browser Compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .icon-wrapper { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
        .lucide { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'hcai-2101-portal';
            
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.FB = { 
                auth, db, appId, collection, addDoc, onSnapshot, query, doc, 
                signInAnonymously, onAuthStateChanged, signInWithCustomToken,
                initialized: true 
            };
            console.log("Firebase SDKs Loaded Successfully");
        } catch (err) {
            console.error("Firebase Init Failed:", err);
            window.FB = { initialized: false, error: err.message };
        }
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, 'stroke-width': 2 },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className]);
            return (
                <span ref={wrapperRef} className={`icon-wrapper ${className}`} style={{ width: size, height: size, minWidth: size, minHeight: size }}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        // --- View Components (Welcome, Input, Interview, Gallery) ---
        // (Simplified for internal logic clarity, keeping your exact styling)

        const WelcomeView = ({ onStart }) => (
            <div className="flex flex-col items-center justify-center min-h-[500px] text-center p-8 bg-white rounded-3xl shadow-sm border border-slate-200">
                <div className="bg-indigo-600 p-5 rounded-3xl mb-8 shadow-xl rotate-3 flex items-center justify-center">
                    <Icon name="globe" size={48} className="text-white" />
                </div>
                <h1 className="text-5xl font-black text-slate-900 mb-6 tracking-tight">Disciplinary Scout Portal</h1>
                <p className="text-xl text-slate-600 max-w-2xl mb-10 leading-relaxed">Connect to the shared intelligence map. Submit your findings and see what your peers are discovering.</p>
                <button onClick={onStart} className="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-5 rounded-2xl font-bold text-lg transition-all hover:scale-105 shadow-2xl">
                    Sync Research to Map <Icon name="arrow-right" size={22} />
                </button>
            </div>
        );

        const InputView = ({ scoutData, onInputChange, onStatusChange, onCancel, onSubmit }) => (
            <div className="max-w-3xl mx-auto p-10 bg-white shadow-2xl rounded-3xl border border-slate-100">
                <div className="flex justify-between items-center mb-8">
                    <h2 className="text-3xl font-bold flex items-center gap-3 text-slate-800"><Icon name="book-open" size={32} className="text-indigo-600" /> Intelligence Upload</h2>
                    <button onClick={onCancel} className="text-slate-400 hover:text-slate-600 font-bold uppercase text-xs tracking-widest">Cancel</button>
                </div>
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input name="name" placeholder="Your Name" value={scoutData.name} onChange={onInputChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 outline-none" />
                        <input name="major" placeholder="Major" value={scoutData.major} onChange={onInputChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 outline-none" />
                    </div>
                    <input name="articleTitle" placeholder="Article Title" value={scoutData.articleTitle} onChange={onInputChange} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 outline-none" />
                    <textarea name="keyImpact" placeholder="Summary..." value={scoutData.keyImpact} onChange={onInputChange} rows="4" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-indigo-500 outline-none resize-none"></textarea>
                    <div className="flex gap-4">
                        {['augmented', 'threatened', 'transformed'].map(s => (
                            <button key={s} onClick={() => onStatusChange(s)} className={`flex-1 py-4 rounded-xl font-bold border-2 ${scoutData.futureJobStatus === s ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 bg-slate-50 text-slate-400'}`}>{s}</button>
                        ))}
                    </div>
                    <button onClick={onSubmit} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-600 shadow-xl">Publish to Class Map</button>
                </div>
            </div>
        );

        const InterviewView = ({ scoutData, onReset, onViewMap }) => (
            <div className="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                <div className="bg-emerald-600 text-white p-8 flex justify-between items-center">
                    <div>
                        <h2 className="text-3xl font-black italic">SCOUT DEBRIEFING</h2>
                        <p className="opacity-90">{scoutData.name} • {scoutData.major}</p>
                    </div>
                    <Icon name="mic" size={32} className="animate-pulse" />
                </div>
                <div className="p-10 space-y-8">
                    <div className="p-6 bg-indigo-50 rounded-2xl border-l-8 border-indigo-500">
                        <p className="text-2xl font-bold text-slate-900">{scoutData.articleTitle}</p>
                        <p className="text-slate-700 mt-2">{scoutData.keyImpact}</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {["Personal Outlook change?", "Human skills left?", "Field in 2030?", "Warnings for students?"].map((q, i) => (
                            <div key={i} className="p-6 bg-slate-50 rounded-2xl border-2 border-slate-100">
                                <p className="text-indigo-600 font-black">Q{i+1}</p>
                                <p className="text-slate-700 font-medium">{q}</p>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-between items-center pt-8 border-t">
                        <button onClick={onReset} className="text-slate-400 font-bold hover:text-indigo-600 flex items-center gap-2"><Icon name="rotate-ccw" size={18} /> New Report</button>
                        <button onClick={onViewMap} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">View Class Map</button>
                    </div>
                </div>
            </div>
        );

        const GalleryView = ({ submissions, onAdd, onInterview }) => (
            <div className="max-w-6xl mx-auto px-4">
                <div className="flex justify-between items-center mb-10">
                    <h2 className="text-4xl font-black text-slate-900">Intelligence Map</h2>
                    <button onClick={onAdd} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2"><Icon name="plus-circle" size={20} /> Add Research</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {submissions.map(s => (
                        <div key={s.id} onClick={() => onInterview(s)} className="bg-white p-8 rounded-3xl border border-slate-100 hover:shadow-xl cursor-pointer transition-all">
                            <div className="flex items-center gap-4 mb-4">
                                <div className="w-10 h-10 bg-indigo-600 text-white rounded-lg flex items-center justify-center font-bold">{s.name ? s.name[0] : 'S'}</div>
                                <div><p className="text-[10px] font-black text-indigo-500 uppercase">{s.major}</p><p className="font-bold">{s.name}</p></div>
                            </div>
                            <h4 className="font-bold text-lg mb-2">{s.articleTitle}</h4>
                            <p className="text-slate-500 text-sm line-clamp-2">{s.keyImpact}</p>
                            <div className="mt-4 pt-4 border-t flex justify-between items-center">
                                <span className="text-[10px] px-2 py-1 bg-slate-100 rounded font-bold uppercase">{s.futureJobStatus}</span>
                                <span className="text-indigo-600 text-xs font-bold underline">Analyze</span>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('welcome');
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [submissions, setSubmissions] = useState([]);
            const [scoutData, setScoutData] = useState({ name: '', major: '', articleTitle: '', keyImpact: '', futureJobStatus: 'augmented' });

            // Initialize Auth with a hard timeout to prevent infinite spinning
            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB && window.FB.initialized) {
                        clearInterval(checkFB);
                        const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FB;
                        try {
                            const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                            if (token) await signInWithCustomToken(auth, token);
                            else await signInAnonymously(auth);
                        } catch (e) { console.error("Auth failed", e); }
                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                }, 100);

                // Fallback after 5 seconds
                const timeout = setTimeout(() => {
                    clearInterval(checkFB);
                    setLoading(false);
                }, 5000);

                return () => { clearInterval(checkFB); clearTimeout(timeout); };
            }, []);

            // Fetch data
            useEffect(() => {
                if (!user || !window.FB) return;
                const { db, collection, onSnapshot, appId, query } = window.FB;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setSubmissions(docs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, (err) => console.error("Firestore Err:", err));
                return () => unsubscribe();
            }, [user]);

            const submit = async () => {
                if (!scoutData.name || !scoutData.articleTitle || !window.FB) return;
                const { db, collection, addDoc, appId } = window.FB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), {
                    ...scoutData, userId: user?.uid || 'anon', timestamp: Date.now()
                });
                setView('interview');
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4">
                    <Icon name="loader-2" size={48} className="animate-spin text-indigo-600" />
                    <p className="text-slate-400 font-bold animate-pulse">Initializing Portal...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="max-w-6xl mx-auto p-8 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('welcome')}>
                            <div className="bg-slate-900 text-white p-2 rounded-xl"><Icon name="graduation-cap" size={24} /></div>
                            <span className="font-black text-xl tracking-tight uppercase">HCAI 2101</span>
                        </div>
                        <nav className="flex gap-6 text-xs font-black uppercase tracking-widest">
                            <button onClick={() => setView('welcome')} className={view === 'welcome' ? 'text-indigo-600' : 'text-slate-400'}>Home</button>
                            <button onClick={() => setView('gallery')} className={view === 'gallery' ? 'text-indigo-600' : 'text-slate-400'}>Map</button>
                        </nav>
                    </header>
                    <main className="mt-4">
                        {view === 'welcome' && <WelcomeView onStart={() => setView('input')} />}
                        {view === 'input' && <InputView scoutData={scoutData} onInputChange={(e) => setScoutData({...scoutData, [e.target.name]: e.target.value})} onStatusChange={(s) => setScoutData({...scoutData, futureJobStatus: s})} onCancel={() => setView('welcome')} onSubmit={submit} />}
                        {view === 'interview' && <InterviewView scoutData={scoutData} onReset={() => { setScoutData({name:'', major:'', articleTitle:'', keyImpact:'', futureJobStatus:'augmented'}); setView('input'); }} onViewMap={() => setView('gallery')} />}
                        {view === 'gallery' && <GalleryView submissions={submissions} onAdd={() => setView('input')} onInterview={(s) => { setScoutData(s); setView('interview'); }} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
