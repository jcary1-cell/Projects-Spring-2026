<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Morphing Wall Space</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for clean UI components -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth glass panel background style */
        .glass-panel {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom styled slider track and thumb */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body class="m-0 p-0 w-screen h-screen overflow-hidden font-sans select-none transition-all duration-75" id="wall">

    <!-- Subtle, Almost Hidden Toggle Button (Bottom-Right Corner) -->
    <button 
        id="btnToggleMenu" 
        class="fixed bottom-4 right-4 z-50 p-3 rounded-full bg-black/5 hover:bg-black/30 text-white/10 hover:text-white/80 transition-all duration-300 focus:outline-none" 
        title="Toggle Controls Panel"
    >
        <i data-lucide="more-vertical" class="w-5 h-5"></i>
    </button>

    <!-- Controls Overlay (Hidden by Default) -->
    <div 
        id="controlsContainer" 
        class="fixed inset-0 z-40 flex flex-col justify-between p-6 opacity-0 pointer-events-none transition-opacity duration-300"
    >
        <!-- Header Stats Area -->
        <header class="w-full flex justify-between items-start pointer-events-none">
            <div class="glass-panel text-white p-4 rounded-2xl flex flex-col gap-1 shadow-2xl pointer-events-auto">
                <h1 class="text-lg font-bold tracking-wider uppercase opacity-90">Color Morphing Wall</h1>
                <p class="text-xs text-gray-300">4 Minutes 5 Seconds Cycle (Red ⇄ Blue)</p>
            </div>

            <div class="glass-panel text-white p-4 rounded-2xl flex flex-col items-end gap-1 shadow-2xl pointer-events-auto">
                <div class="text-xs text-gray-300 uppercase tracking-widest font-semibold">Active Color Info</div>
                <div class="font-mono text-sm font-bold flex gap-3 items-center">
                    <span id="colorHex" class="bg-black/30 px-2 py-0.5 rounded">#FF0000</span>
                    <span id="colorRgb" class="bg-black/30 px-2 py-0.5 rounded">rgb(255, 0, 0)</span>
                </div>
            </div>
        </header>

        <!-- Main Visualizer Focus / Big Clock -->
        <main class="flex-1 flex flex-col justify-center items-center pointer-events-none">
            <div class="glass-panel text-white px-10 py-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center gap-2 pointer-events-auto max-w-sm text-center">
                <div id="statusLabel" class="text-xs uppercase tracking-widest text-red-400 font-bold animate-pulse">Fading to Blue</div>
                <div id="timeDisplay" class="font-mono text-5xl font-extrabold tracking-tight select-all">00:00.000</div>
                <div class="w-full bg-white/10 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="progressBar" class="bg-white h-full transition-all duration-75" style="width: 0%"></div>
                </div>
                <div class="text-[10px] text-gray-400 mt-2 font-mono" id="percentageDisplay">0% complete</div>
            </div>
        </main>

        <!-- Bottom Controls & Timeline Panel -->
        <footer class="w-full flex justify-center pointer-events-none">
            <div class="glass-panel text-white p-6 rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col gap-5 pointer-events-auto">
                <!-- Timeline scrubbing Slider -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between text-xs font-mono text-gray-300">
                        <span class="flex items-center gap-1"><i data-lucide="circle-dot" class="w-3 h-3 text-red-500"></i> Red (0:00)</span>
                        <span class="flex items-center gap-1"><i data-lucide="circle-dot" class="w-3 h-3 text-blue-500"></i> Blue (2:02.5)</span>
                        <span class="flex items-center gap-1"><i data-lucide="circle-dot" class="w-3 h-3 text-red-500"></i> Red (4:05)</span>
                    </div>
                    <input 
                        type="range" 
                        id="timelineSlider" 
                        min="0" 
                        max="245" 
                        step="0.01" 
                        value="0" 
                        class="w-full h-2 bg-white/20 rounded-lg appearance-none cursor-pointer accent-white focus:outline-none"
                    />
                </div>

                <!-- Buttons and Playback Controls -->
                <div class="flex items-center justify-between gap-4">
                    <!-- Info details -->
                    <div class="text-xs text-gray-300 hidden sm:block">
                        Total Duration: <strong class="font-mono text-white">245 seconds</strong>
                    </div>

                    <!-- Central Control Cluster -->
                    <div class="flex items-center gap-3 mx-auto sm:mx-0">
                        <button 
                            id="btnReset" 
                            title="Restart Animation" 
                            class="p-3 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white flex items-center justify-center"
                        >
                            <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                        </button>
                        
                        <button 
                            id="btnPlayPause" 
                            title="Play / Pause" 
                            class="p-4 rounded-full bg-white text-slate-900 hover:bg-gray-100 active:scale-95 transition-all flex items-center justify-center shadow-lg"
                        >
                            <i id="playIcon" data-lucide="play" class="w-6 h-6 fill-current"></i>
                        </button>

                        <button 
                            id="btnToggleCycle" 
                            title="Loop Mode Status" 
                            class="p-3 rounded-full bg-white/10 hover:bg-white/20 active:scale-95 transition-all text-white flex items-center justify-center"
                        >
                            <i id="loopIcon" data-lucide="repeat" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <!-- Custom Speed Controls -->
                    <div class="flex items-center gap-1 bg-black/20 p-1 rounded-xl text-xs font-mono">
                        <button id="speed05x" class="px-2.5 py-1.5 rounded-lg text-gray-300 hover:text-white transition">0.5x</button>
                        <button id="speed1x" class="px-2.5 py-1.5 rounded-lg bg-white/10 text-white font-bold transition">1x</button>
                        <button id="speed5x" class="px-2.5 py-1.5 rounded-lg text-gray-300 hover:text-white transition">5x</button>
                        <button id="speed10x" class="px-2.5 py-1.5 rounded-lg text-gray-300 hover:text-white transition">10x</button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Constants & State
        const TOTAL_DURATION_SECONDS = 245; // 4 minutes and 5 seconds (245 seconds)
        let currentTime = 0; // Current progress in seconds
        let isPlaying = false;
        let isLooping = true;
        let playbackRate = 1.0; // Speed modifier (0.5x, 1x, 5x, 10x)
        let lastFrameTime = null;
        let animationFrameId = null;
        let showControls = false;

        // Colors
        const START_COLOR = { r: 220, g: 38, b: 38 }; // Red-600
        const END_COLOR = { r: 37, g: 99, b: 235 };   // Blue-600

        // DOM elements
        const wall = document.getElementById('wall');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressBar = document.getElementById('progressBar');
        const percentageDisplay = document.getElementById('percentageDisplay');
        const statusLabel = document.getElementById('statusLabel');
        const timelineSlider = document.getElementById('timelineSlider');
        const colorHex = document.getElementById('colorHex');
        const colorRgb = document.getElementById('colorRgb');
        const btnToggleMenu = document.getElementById('btnToggleMenu');
        const controlsContainer = document.getElementById('controlsContainer');

        // Buttons and control icons
        const btnPlayPause = document.getElementById('btnPlayPause');
        const playIcon = document.getElementById('playIcon');
        const btnReset = document.getElementById('btnReset');
        const btnToggleCycle = document.getElementById('btnToggleCycle');
        const loopIcon = document.getElementById('loopIcon');

        // Speed Buttons
        const speedButtons = {
            0.5: document.getElementById('speed05x'),
            1.0: document.getElementById('speed1x'),
            5.0: document.getElementById('speed5x'),
            10.0: document.getElementById('speed10x')
        };

        // Toggle UI Menu Visibility
        btnToggleMenu.addEventListener('click', () => {
            showControls = !showControls;
            if (showControls) {
                controlsContainer.classList.remove('opacity-0', 'pointer-events-none');
                controlsContainer.classList.add('opacity-100');
                btnToggleMenu.classList.add('bg-black/30', 'text-white/80');
                btnToggleMenu.classList.remove('bg-black/5', 'text-white/10');
            } else {
                controlsContainer.classList.add('opacity-0', 'pointer-events-none');
                controlsContainer.classList.remove('opacity-100');
                btnToggleMenu.classList.remove('bg-black/30', 'text-white/80');
                btnToggleMenu.classList.add('bg-black/5', 'text-white/10');
            }
        });

        // Utility: Convert RGB components to Hex String
        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => {
                const hex = Math.round(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("").toUpperCase();
        }

        // Format duration into MM:SS.mmm format
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            const millis = Math.floor((seconds % 1) * 1000);
            
            const minStr = String(mins).padStart(2, '0');
            const secStr = String(secs).padStart(2, '0');
            const milStr = String(millis).padStart(3, '0');
            
            return `${minStr}:${secStr}.${milStr}`;
        }

        // Calculate active color and update DOM
        function updateScene() {
            const progressRatio = currentTime / TOTAL_DURATION_SECONDS;
            
            let interpolationFactor = 0;
            if (progressRatio <= 0.5) {
                // Going from Red (0.0) to Blue (1.0)
                interpolationFactor = progressRatio * 2; 
                statusLabel.textContent = "Fading to Blue";
                statusLabel.className = "text-xs uppercase tracking-widest text-blue-400 font-bold animate-pulse";
            } else {
                // Going from Blue (1.0) to Red (0.0)
                interpolationFactor = 2 - (progressRatio * 2);
                statusLabel.textContent = "Returning to Red";
                statusLabel.className = "text-xs uppercase tracking-widest text-red-400 font-bold animate-pulse";
            }

            // Interpolate colors
            const r = Math.round(START_COLOR.r + (END_COLOR.r - START_COLOR.r) * interpolationFactor);
            const g = Math.round(START_COLOR.g + (END_COLOR.g - START_COLOR.g) * interpolationFactor);
            const b = Math.round(START_COLOR.b + (END_COLOR.b - START_COLOR.b) * interpolationFactor);

            const activeColorString = `rgb(${r}, ${g}, ${b})`;
            const activeHex = rgbToHex(r, g, b);

            // Update DOM background and info elements
            wall.style.backgroundColor = activeColorString;
            colorHex.textContent = activeHex;
            colorRgb.textContent = activeColorString;

            // Update Timer Text
            timeDisplay.textContent = formatTime(currentTime);

            // Update percentage and UI Progress Bar
            const percent = (progressRatio * 100).toFixed(1);
            progressBar.style.width = `${percent}%`;
            percentageDisplay.textContent = `${percent}% complete`;

            // Sync Timeline Slider without triggering loops
            timelineSlider.value = currentTime;
        }

        // Standard requestAnimationFrame loop
        function animationLoop(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const deltaMs = timestamp - lastFrameTime;
            lastFrameTime = timestamp;

            if (isPlaying) {
                currentTime += (deltaMs / 1000) * playbackRate;

                if (currentTime >= TOTAL_DURATION_SECONDS) {
                    if (isLooping) {
                        currentTime = 0; 
                    } else {
                        currentTime = TOTAL_DURATION_SECONDS;
                        pause();
                    }
                }
                updateScene();
            }

            if (isPlaying) {
                animationFrameId = requestAnimationFrame(animationLoop);
            }
        }

        // Toggle Play / Pause state
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function play() {
            if (currentTime >= TOTAL_DURATION_SECONDS) {
                currentTime = 0; 
            }
            isPlaying = true;
            lastFrameTime = performance.now();
            animationFrameId = requestAnimationFrame(animationLoop);
            
            playIcon.setAttribute('data-lucide', 'pause');
            lucide.createIcons();
        }

        function pause() {
            isPlaying = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            playIcon.setAttribute('data-lucide', 'play');
            lucide.createIcons();
        }

        function reset() {
            currentTime = 0;
            updateScene();
            if (!isPlaying) {
                lastFrameTime = null;
            }
        }

        // Change animation speed factor
        function changeSpeed(rate) {
            playbackRate = rate;
            
            Object.keys(speedButtons).forEach(speed => {
                const btn = speedButtons[speed];
                if (parseFloat(speed) === rate) {
                    btn.classList.add('bg-white/10', 'text-white', 'font-bold');
                    btn.classList.remove('text-gray-300');
                } else {
                    btn.classList.remove('bg-white/10', 'text-white', 'font-bold');
                    btn.classList.add('text-gray-300');
                }
            });
        }

        // Toggle Loop/Restart cycle
        function toggleLoop() {
            isLooping = !isLooping;
            if (isLooping) {
                btnToggleCycle.classList.add('bg-white/10', 'text-white');
                btnToggleCycle.classList.remove('text-gray-400');
                loopIcon.setAttribute('data-lucide', 'repeat');
            } else {
                btnToggleCycle.classList.remove('bg-white/10', 'text-white');
                btnToggleCycle.classList.add('text-gray-400');
                loopIcon.setAttribute('data-lucide', 'repeat-1');
            }
            lucide.createIcons();
        }

        // Setup Event Listeners
        btnPlayPause.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', reset);
        btnToggleCycle.addEventListener('click', toggleLoop);

        // Timeline Slider scrub listener
        timelineSlider.addEventListener('input', (e) => {
            const wasPlaying = isPlaying;
            if (isPlaying) pause();
            
            currentTime = parseFloat(e.target.value);
            updateScene();
            
            if (wasPlaying) play();
        });

        // Set up Speed selection listeners
        speedButtons[0.5].addEventListener('click', () => changeSpeed(0.5));
        speedButtons[1.0].addEventListener('click', () => changeSpeed(1.0));
        speedButtons[5.0].addEventListener('click', () => changeSpeed(5.0));
        speedButtons[10.0].addEventListener('click', () => changeSpeed(10.0));

        // Keyboard triggers
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'KeyR') {
                reset();
            }
        });

        // Start playing automatically
        updateScene();
        play();
    </script>
</body>
</html>
